name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - name: build docs
        run: |
          cd docs
          curl -fsSL https://github.com/nicholasgasior/tago/releases/latest/download/tago_linux_amd64.tar.gz | tar -xz
          ./tago build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  cloudflare:
    runs-on: ubuntu-latest
    needs: build
    if: vars.CLOUDFLARE_ACCOUNT_ID != ''
    steps:
      - uses: actions/checkout@v5
      - name: build docs
        run: |
          cd docs
          curl -fsSL https://github.com/nicholasgasior/tago/releases/latest/download/tago_linux_amd64.tar.gz | tar -xz
          ./tago build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/public --project-name=pixiv-cli
